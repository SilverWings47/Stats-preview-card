<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Stats preview card component</title>

</head>
<body>
  <main>
    <div class="card">
      <div class="card-text">
        <h1 class="header-text">Get <span>insights</span> that help your business grow.</h1>
        <div class="description">
          Discover the benefits of data analytics and make better decisions regarding revenue, customer 
          experience, and overall efficiency.
        </div>
        <div class="stats-box">
          <div class="box">
            <span>10k+</span> 
            <p>companies</p>
          </div>
          <div class="box">
            <span>314</span>
            <p>templates</p>
          </div>
          <div class="box">
            <span>12M+</span>
            <p>queries</p>
          </div>
        </div>
      </div>
      <div class="card-image">
        <picture>
          <source media="(max-width: 540px)" srcset="images/image-header-mobile.jpg">
          <img src="images/image-header-desktop.jpg" alt="People in a meeting">
        </picture>
      </div>
    </div>
  </main>

  <footer>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a target="_blank" href="https://twitter.com/iSilverWings">Sami Nasri</a>.
    </div>
    </footer>

</body>
</html>
